<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFat Visualization | Raft Consensus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">⬢</span>
                <h1>RFat<span>Visualization</span></h1>
            </div>
            <div class="global-controls">
                <button id="playPauseBtn" class="control-btn" title="Pause/Resume Simulation">
                    <svg class="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    <svg class="icon-play hidden" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </button>
                <div class="speed-control">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
                </div>
                <button id="resetBtn" class="control-btn" title="Reset Simulation">
                    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>
        </header>

        <main class="content">
            <section class="viz-area">
                <div id="simulationCanvas" class="canvas-container">
                    <!-- SVG nodes and lines will be injected here -->
                    <svg id="networkSvg" viewBox="0 0 800 600"></svg>
                </div>
                
                <div class="legend">
                    <div class="legend-item"><span class="dot follower"></span> Follower</div>
                    <div class="legend-item"><span class="dot candidate"></span> Candidate</div>
                    <div class="legend-item"><span class="dot leader"></span> Leader</div>
                </div>
            </section>

            <section class="sidebar">
                <div class="panel log-panel">
                    <h3><svg viewBox="0 0 24 24" class="panel-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Cluster Logs</h3>
                    <div id="logGrid" class="log-grid">
                        <!-- Log entries injected here -->
                    </div>
                </div>

                <div id="nodeDetail" class="panel detail-panel hidden">
                    <h3>Node Details <span id="detailNodeId">S1</span></h3>
                    <div class="detail-content">
                        <div class="detail-row"><span>State:</span> <strong id="detailState">Follower</strong></div>
                        <div class="detail-row"><span>Term:</span> <strong id="detailTerm">0</strong></div>
                        <div class="detail-row"><span>Voted For:</span> <strong id="detailVotedFor">None</strong></div>
                        <div class="detail-row"><span>Commit Index:</span> <strong id="detailCommit">0</strong></div>
                        <div class="actions">
                            <button id="btnTimeout" class="action-btn">Force Timeout</button>
                            <button id="btnRequest" class="action-btn">Client Request</button>
                            <button id="btnStop" class="action-btn danger">Stop Node</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="status-bar">
            <div id="statusMessage">Simulation Running...</div>
            <div class="timer-display">Elapsed: <span id="elapsedTime">0.0s</span></div>
        </footer>
    </div>

    <script src="raft_sim.js"></script>
    <script src="viz.js"></script>
</body>
</html>
